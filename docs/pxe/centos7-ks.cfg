%addon
com_redhat_kdump --disable --reserve-mb='auto'
%end

%anaconda
pwpolicy root --minlen=6 --minquality=1 --notstrict --nochanges --notempty
pwpolicy user --minlen=6 --minquality=1 --notstrict --nochanges --emptyok
pwpolicy luks --minlen=6 --minquality=1 --notstrict --nochanges --notempty
%end

# --- 在文件末尾定义脚本 ---
# %pre
# 查找系统中第一个不是 USB 的磁盘
# BOOT_DRIVE=$(lsblk -ndno NAME | grep -v 'usb' | head -n1)
# 将分区指令写入临时文件
# echo "clearpart --all --initlabel --drives=${BOOT_DRIVE}" > /tmp/part-include
# echo "part / --fstype=xfs --onpart=${BOOT_DRIVE} --grow --size=1" >> /tmp/part-include
# %end

%pre
# 检测第一个非移动设备磁盘 (如 sda, vda, nvme0n1)
DIRTY_DISK=$(lsblk -dpno NAME | grep -v 'usb' | head -n1)
# 将 ignoredisk 指令写入包含文件，只允许安装程序看到这块盘
echo "ignoredisk --only-use=${DIRTY_DISK}" > /tmp/disk-choice
echo "clearpart --all --initlabel --drives=${DIRTY_DISK}" >> /tmp/disk-choice
echo "autopart --nohome --type=lvm" >> /tmp/disk-choice
%end

# 2. 在脚本区动态识别并写入指令
%pre
# 识别主版本号（例如从 /etc/os-release 或内核信息中获取）
OS_VER=$(grep -oP '(?<=VERSION_ID=")\d+' /etc/os-release)

# 根据版本定义不同的镜像路径
if [ "$OS_VER" == "7" ]; then
    BASE_URL="mirrors.ustc.edu.cn"
    echo "url --url=\"$BASE_URL\"" > /tmp/repo-include
elif [ "$OS_VER" == "8" ]; then
    # CentOS 8 结构不同，需要 BaseOS 和 AppStream
    BASE_URL="mirrors.ustc.edu.cn"
    echo "url --url=\"$BASE_URL\"" > /tmp/repo-include
    echo "repo --name=\"AppStream\" --baseurl=\"mirrors.ustc.edu.cn\"" >> /tmp/repo-include
fi
%end