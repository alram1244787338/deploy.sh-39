# initrd.img inst.ks=https://gitee.com/xiagw/deploy.sh/raw/main/docs/pxe/ks.cfg

# Kickstart 示范文件 - 兼容多环境与版本
# 适用版本: CentOS 7/8/9, RockyLinux, AlmaLinux

# ==========================================
# 1. 主配置区 (Command Section)
# ==========================================
auth --enableshadow --passalgo=sha512
keyboard --vckeymap=us --xlayouts='us'
lang en_US.UTF-8 --addsupport=zh_CN.UTF-8
timezone Asia/Shanghai --isUtc

# [关键点] 引用 %pre 阶段生成的文件
# 如果文件不存在，Anaconda 会报错，因此 %pre 必须成功创建这些文件
%include /tmp/disk-config
%include /tmp/repo-config

# 网络配置（如果在 %pre 中需要联网，请确保此处或引导时已配置网络）
network  --bootproto=dhcp --device=enp1s0 --ipv6=auto --activate
#network  --hostname=devops.flyh5.cn
# 基础安全设置
rootpw --iscrypted $6$mHCclxWSOJkOFgsB$9mf9tW/XVFN8qtRv0gmXLQ/q99WNjSg.6860hqi2T8aQzuYsIZcS3FIIVM1V5HormJEDcD5I/xQhS6v7KaUGS/
user --groups=wheel --name=ops --password=$6$PbrSVJPSm0jfyyCM$UxfX3i5fNA2o.Lz/3SzGTccqt4jInbcuMpQ97OcLjH/DrriTKgXx6UI2iKNB5WTsOMvlS49beGyPO0vONxier/ --iscrypted --gecos="ops"
firewall --enabled --ssh
selinux --enforcing
firstboot --disable

# ==========================================
# 2. 软件包区
# ==========================================
%packages
@^minimal-environment
kexec-tools
vim
curl
wget
%end

# ==========================================
# 3. 预安装脚本区 (%pre) - 按照顺序执行
# ==========================================

# 脚本 A: 自动识别磁盘
%pre --log=/tmp/pre-disk.log
#!/bin/bash
# 逻辑：优先寻找第一个非 USB 的磁盘（适配 vda, sda, nvme）
TARGET_DISK=$(lsblk -dpno NAME | grep -v 'usb' | head -n1)

if [ -z "$TARGET_DISK" ]; then
    # 如果没找到，默认 fallback 到 sda
    TARGET_DISK="/dev/sda"
fi

# 生成分区配置
echo "ignoredisk --only-use=${TARGET_DISK}" > /tmp/disk-config
echo "clearpart --all --initlabel --drives=${TARGET_DISK}" >> /tmp/disk-config
echo "autopart --nohome --type=lvm" >> /tmp/disk-config
%end

# 脚本 B: 自动识别系统版本并配置 URL
%pre --log=/tmp/pre-repo.log
#!/bin/bash
# 逻辑：从安装镜像的环境变量或文件中提取主版本号
OS_VER=$(grep -oP '(?<=VERSION_ID=")\d+' /etc/os-release | head -n1)

# 定义镜像站基础地址
MIRROR_BASE="mirrors.ustc.edu.cn/centos-vault"

if [ "$OS_VER" == "7" ]; then
    echo "url --url=\"${MIRROR_BASE}/7.9.2009/os/x86_64/\"" > /tmp/repo-config
else
    # CentOS 8/9 或其它类 RHEL 系统通常分为 BaseOS 和 AppStream
    # 这里以 8.5.2111 为例
    echo "url --url=\"${MIRROR_BASE}/8.5.2111/BaseOS/x86_64/os/\"" > /tmp/repo-config
    echo "repo --name=\"AppStream\" --baseurl=\"${MIRROR_BASE}/8.5.2111/AppStream/x86_64/os/\"" >> /tmp/repo-config
fi
%end

# ==========================================
# 4. 后安装脚本区 (%post)
# ==========================================
%post --interpreter=/bin/bash
# 在此处进行系统初始优化
echo "Installation complete at $(date)" >> /etc/motd
%end

%post --log=/root/ks-post-repo.log
# 1. 备份原有的 repo 文件
mkdir -p /etc/yum.repos.d/bak
cp -vf /etc/yum.repos.d/*.repo /etc/yum.repos.d/bak/

# 2. 识别系统主版本号并配置对应的 repo
OS_VER=$(grep -oP '(?<=VERSION_ID=")\d+' /etc/os-release)

if [ "$OS_VER" == "7" ]; then
    # 为 CentOS 7 配置 USTC 镜像
    # curl -o /etc/yum.repos.d/CentOS-Base.repo mirrors.ustc.edu.cn # 注意：此处应指向具体的 repo 配置文件 URL
    # 或者用 sed 批量替换
    sudo sed -i.bak \
    -e 's|^mirrorlist=|#mirrorlist=|g' \
    -e 's|^#baseurl=http://mirror.centos.org/centos|baseurl=https://mirrors.ustc.edu.cn/centos-vault/centos|g' \
    /etc/yum.repos.d/CentOS-Base.repo
else
    # 为 CentOS 8/9 或 Rocky Linux 配置镜像
    # 通常使用官方提供的替换脚本或 sed 命令修改 /etc/yum.repos.d/ 中的内容
    sed -e 's|^mirrorlist=|#mirrorlist=|g' \
        -e 's|^#baseurl=http://mirror.centos.org|baseurl=https://mirrors.ustc.edu.cn|g' \
        -i.bak /etc/yum.repos.d/centos*.repo
fi

# 3. 刷新缓存并执行一次更新（可选）
# yum clean all
# yum makecache
%end
