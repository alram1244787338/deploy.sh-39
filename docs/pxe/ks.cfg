# Kickstart 示范文件 - 兼容多环境与版本
# 适用版本: CentOS 7/8/9, RockyLinux, AlmaLinux

# ==========================================
# 1. 主配置区 (Command Section)
# ==========================================
keyboard --vckeymap=us --xlayouts='us'
lang en_US.UTF-8 --addsupport=zh_CN.UTF-8
reboot --eject

# [关键点] 引用 %pre 阶段生成的文件
# 如果文件不存在，Anaconda 会报错，因此 %pre 必须成功创建这些文件
%include /tmp/pre-config

# 网络配置（如果在 %pre 中需要联网，请确保此处或引导时已配置网络）
network  --bootproto=dhcp --device=enp1s0 --ipv6=auto --activate
#network  --hostname=devops.flyh5.cn
# 基础安全设置
rootpw --iscrypted $6$mHCclxWSOJkOFgsB$9mf9tW/XVFN8qtRv0gmXLQ/q99WNjSg.6860hqi2T8aQzuYsIZcS3FIIVM1V5HormJEDcD5I/xQhS6v7KaUGS/
user --groups=wheel --name=ops --password=$6$PbrSVJPSm0jfyyCM$UxfX3i5fNA2o.Lz/3SzGTccqt4jInbcuMpQ97OcLjH/DrriTKgXx6UI2iKNB5WTsOMvlS49beGyPO0vONxier/ --iscrypted --gecos="ops"
firewall --enabled --ssh
selinux --enforcing
firstboot --disable

# ==========================================
# 2. 软件包区
# ==========================================
%packages
# @Minimal Install
# @^minimal-environment
kexec-tools
vim
curl
wget
zsh
tmux
# epel-release
# byobu
%end

# ==========================================
# 3. 预安装脚本区 (%pre) - 按照顺序执行
# ==========================================

%pre --log=/tmp/ks-pre-config.log
#!/bin/bash
touch /tmp/pre-config

# 逻辑：从安装镜像的环境变量或文件中提取主版本号
OS_VER=$(grep -oP '(?<=VERSION_ID=")\d+' /etc/os-release | head -n1)
ARCH=$(uname -m)

if [ "$OS_VER" -gt 9 ]; then
    echo "timezone Asia/Shanghai --utc" >>/tmp/pre-config
else
    echo "auth --enableshadow --passalgo=sha512" >>/tmp/pre-config
    echo "timezone Asia/Shanghai --isUtc" >>/tmp/pre-config
fi

# 自动识别磁盘
# 逻辑：优先寻找第一个非 USB 的磁盘（适配 vda, sda, nvme）
TARGET_DISK=$(lsblk -dpno NAME | grep -vE 'loop|usb|sr0|zram' | head -n1)
if [ -z "$TARGET_DISK" ]; then
    # 如果没找到，默认 fallback 到 sda
    TARGET_DISK="/dev/sda"
fi
# 生成分区配置
echo "ignoredisk --only-use=${TARGET_DISK}" >>/tmp/pre-config
echo "clearpart --all --initlabel --drives=${TARGET_DISK}" >>/tmp/pre-config
echo "autopart --nohome --type=lvm" >>/tmp/pre-config

# 自动识别系统版本并配置 URL
# 定义镜像站基础地址
MIRROR_BASE="https://mirrors.ustc.edu.cn"
# 根据版本生成配置
if [ "$OS_VER" == "7" ]; then
    # CentOS 7 官方已停止维护，指向 Vault 7.9.2009
    echo "url --url=\"${MIRROR_BASE}/centos-vault/7.9.2009/os/${ARCH}/\"" >>/tmp/pre-config
elif [ "$OS_VER" == "8" ]; then
    # CentOS 8 统一指向 Vault 中的最终版 8.5.2111
    echo "url --url=\"${MIRROR_BASE}/centos-vault/8.5.2111/BaseOS/${ARCH}/os/\"" >>/tmp/pre-config
    echo "repo --name=\"AppStream\" --baseurl=\"${MIRROR_BASE}/centos-vault/8.5.2111/AppStream/${ARCH}/os/\"" >>/tmp/pre-config
elif [ "$OS_VER" == "9" ]; then
    # CentOS 9 通常指 Stream 版
    echo "url --url=\"${MIRROR_BASE}/centos-stream/9-stream/BaseOS/${ARCH}/os/\"" >>/tmp/pre-config
    echo "repo --name=\"AppStream\" --baseurl=\"${MIRROR_BASE}/centos-stream/9-stream/AppStream/${ARCH}/os/\"" >>/tmp/pre-config
else
    # 默认兜底方案（可指向一个通用地址或报错）
    echo "url --url=\"${MIRROR_BASE}/centos-stream/10-stream/BaseOS/${ARCH}/os/\"" >>/tmp/pre-config
    echo "repo --name=\"AppStream\" --baseurl=\"${MIRROR_BASE}/centos-stream/10-stream/AppStream/${ARCH}/os/\"" >>/tmp/pre-config
fi
%end

# ==========================================
# 4. 后安装脚本区 (%post)
# ==========================================
%post --log=/root/ks-post-config.log
# 在此处进行系统初始优化
echo "Installation complete at $(date)" >> /etc/motd

# 1. 备份原有的 repo 文件
mkdir -p /etc/yum.repos.d/bak
cp -vf /etc/yum.repos.d/*.repo /etc/yum.repos.d/bak/

# 2. 识别系统主版本号并配置对应的 repo
OS_VER=$(grep -oP '(?<=VERSION_ID=")\d+' /etc/os-release)

if [ "$OS_VER" == "7" ]; then
    # 为 CentOS 7 配置 USTC 镜像
    # curl -o /etc/yum.repos.d/CentOS-Base.repo mirrors.ustc.edu.cn # 注意：此处应指向具体的 repo 配置文件 URL
    # 或者用 sed 批量替换
    sed -i \
    -e 's|^mirrorlist=|#mirrorlist=|g' \
    -e 's|^#baseurl=http://mirror.centos.org/centos|baseurl=https://mirrors.ustc.edu.cn/centos-vault|g' \
    /etc/yum.repos.d/CentOS-Base.repo
else
    # 为 CentOS 8/9 或 Rocky Linux 配置镜像
    # 通常使用官方提供的替换脚本或 sed 命令修改 /etc/yum.repos.d/ 中的内容
    sed -i \
        -e 's|^mirrorlist=|#mirrorlist=|g' \
        -e 's|^#baseurl=http://mirror.centos.org|baseurl=https://mirrors.ustc.edu.cn|g' \
        /etc/yum.repos.d/centos*.repo
fi

# 3. 刷新缓存并执行一次更新（可选）
# yum clean all
# yum makecache
%end
